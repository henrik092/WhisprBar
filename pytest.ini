[pytest]
# Pytest configuration for WhisprBar

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=whisprbar
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch

# Markers for categorizing tests
markers =
    unit: Unit tests for individual functions
    integration: Integration tests across modules
    slow: Tests that take significant time
    requires_gpu: Tests that require GPU hardware
    requires_api_key: Tests that require API credentials

# Ignore paths
norecursedirs = .git .venv build dist *.egg-info

# Minimum Python version
minversion = 3.8
